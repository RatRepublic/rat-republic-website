<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rat Republic — Register</title>
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
    <style>
        @font-face { font-family: 'Inter'; src: url('fonts/Inter-VariableFont_opsz,wght.ttf') format('truetype'); font-weight: 100 900; font-style: normal; }
        @font-face { font-family: 'NftOpensea'; src: url('fonts/NftOpenseaRegular-jEJvR.ttf') format('truetype'); }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #080808; --surface: #111111; --surface-2: #161616;
            --border: rgba(255,255,255,0.07); --border-hover: rgba(255,255,255,0.15);
            --text: #ffffff; --text-muted: rgba(255,255,255,0.45); --text-dim: rgba(255,255,255,0.22);
            --accent: #C8E030; --accent-dim: rgba(200,224,48,0.1);
        }
        html, body { min-height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 20px 60px; min-height: 100vh; }

        .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; margin-bottom: 32px; }
        .brand img { width: 28px; height: 28px; object-fit: contain; }
        .brand span { font-family: 'NftOpensea'; font-size: 0.88rem; letter-spacing: 0.12em; color: var(--text); }

        .auth-card { width: 100%; max-width: 400px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 36px 32px; }

        .card-title { font-family: 'NftOpensea'; font-size: 1.5rem; letter-spacing: 0.08em; color: var(--text); margin-bottom: 4px; text-align: center; }
        .card-sub { font-size: 0.72rem; color: var(--text-dim); text-align: center; letter-spacing: 0.06em; margin-bottom: 28px; }

        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 0.62rem; font-weight: 600; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 7px; }
        .field input { width: 100%; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.9rem; padding: 11px 14px; outline: none; transition: border-color 0.15s; }
        .field input:focus { border-color: rgba(200,224,48,0.4); }
        .field input::placeholder { color: var(--text-dim); }

        .btn-submit { width: 100%; font-family: 'NftOpensea'; font-size: 0.88rem; letter-spacing: 0.08em; color: #0a0a0a; background: var(--accent); border: none; border-radius: 10px; padding: 14px; cursor: pointer; transition: opacity 0.15s; margin-top: 6px; }
        .btn-submit:hover { opacity: 0.9; }
        .btn-submit:disabled { opacity: 0.35; cursor: not-allowed; }

        .msg { margin-top: 12px; font-size: 0.78rem; text-align: center; min-height: 1.2em; }
        .msg.error { color: #ff8080; }
        .msg.success { color: var(--accent); }

        .footer-link { text-align: center; margin-top: 20px; font-size: 0.74rem; color: var(--text-dim); }
        .footer-link a { color: var(--accent); text-decoration: none; }
        .footer-link a:hover { text-decoration: underline; }

        /* Inbox screen */
        .check-inbox { text-align: center; padding: 8px 0; }
        .inbox-icon { font-size: 2.8rem; margin-bottom: 14px; }
        .inbox-title { font-family: 'NftOpensea'; font-size: 1.2rem; color: var(--accent); letter-spacing: 0.08em; margin-bottom: 12px; }
        .inbox-body { color: var(--text-muted); font-size: 0.8rem; line-height: 1.7; margin-bottom: 20px; }
        .inbox-email { color: var(--accent); }
        .btn-resend { background: transparent; border: 1px solid var(--border-hover); color: var(--text-dim); font-family: 'Inter'; font-size: 0.75rem; padding: 8px 20px; border-radius: 8px; cursor: pointer; transition: all 0.15s; }
        .btn-resend:hover { border-color: var(--accent); color: var(--accent); }
        .btn-resend:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>
    <a href="/" class="brand">
        <img src="images/branding/rat-republic-logo.svg" alt="">
        <span>RAT REPUBLIC</span>
    </a>

    <div class="auth-card">
        <div class="card-title" id="card-title">REGISTER</div>
        <div class="card-sub" id="card-sub">CREATE YOUR RAT REPUBLIC ACCOUNT</div>

        <div class="field">
            <label>Username</label>
            <input type="text" id="username" placeholder="RatKing" maxlength="20" autocomplete="username">
        </div>
        <div class="field">
            <label>Email</label>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" id="password" placeholder="Min 8 characters" autocomplete="new-password">
        </div>
        <div class="field">
            <label>Confirm Password</label>
            <input type="password" id="confirm" placeholder="Repeat password" autocomplete="new-password">
        </div>

        <button class="btn-submit" id="register-btn">Create Account</button>
        <div class="msg" id="msg"></div>

        <div class="footer-link" id="login-link">Already have an account? <a href="login">Log in</a></div>

        <div class="check-inbox" id="inbox-screen" style="display:none;">
            <div class="inbox-icon">📬</div>
            <div class="inbox-title">CHECK YOUR INBOX</div>
            <div class="inbox-body">
                We sent a verification link to<br>
                <span class="inbox-email" id="inbox-email-display"></span><br><br>
                Click the link in the email to activate your account.<br>
                The link expires in <strong style="color:var(--accent);">24 hours</strong>.
            </div>
            <button class="btn-resend" id="resend-btn">Resend Email</button>
            <div class="msg" id="resend-msg" style="margin-top:10px;"></div>
        </div>
    </div>

    <script>
        var btn = document.getElementById('register-btn');
        var msg = document.getElementById('msg');
        var registeredEmail = '';
        var refCode = new URLSearchParams(window.location.search).get('ref') || '';

        btn.addEventListener('click', async function () {
            var username = document.getElementById('username').value.trim();
            var email    = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;
            var confirm  = document.getElementById('confirm').value;

            msg.className = 'msg';
            msg.textContent = '';

            if (!email || !password) {
                msg.className = 'msg error';
                msg.textContent = 'Email and password are required.';
                return;
            }
            if (password.length < 8) {
                msg.className = 'msg error';
                msg.textContent = 'Password must be at least 8 characters.';
                return;
            }
            if (password !== confirm) {
                msg.className = 'msg error';
                msg.textContent = 'Passwords do not match.';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Creating...';

            try {
                var resp = await fetch('api/auth.php?action=register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, email: email, password: password, ref: refCode })
                });
                var data = await resp.json();

                if (!resp.ok) {
                    msg.className = 'msg error';
                    msg.textContent = data.error || 'Registration failed.';
                    btn.disabled = false;
                    btn.textContent = 'Create Account';
                    return;
                }

                registeredEmail = email;
                document.getElementById('inbox-email-display').textContent = email;
                document.querySelectorAll('.field, #register-btn, #msg, #login-link').forEach(function (el) { el.style.display = 'none'; });
                document.getElementById('inbox-screen').style.display = 'block';
                document.getElementById('card-title').textContent = 'ALMOST THERE';
                document.getElementById('card-sub').textContent   = 'ONE LAST STEP';

            } catch (e) {
                msg.className = 'msg error';
                msg.textContent = 'Network error. Please try again.';
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        });

        var resendBtn = document.getElementById('resend-btn');
        var resendMsg = document.getElementById('resend-msg');
        var resendCooldown = false;

        resendBtn.addEventListener('click', async function () {
            if (resendCooldown || !registeredEmail) return;
            resendBtn.disabled = true;
            resendMsg.className = 'msg';
            resendMsg.textContent = 'Sending...';
            resendCooldown = true;

            try {
                await fetch('api/auth.php?action=resend-verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: registeredEmail })
                });
                resendMsg.className = 'msg success';
                resendMsg.textContent = 'Email resent! Check your inbox.';
            } catch (e) {
                resendMsg.className = 'msg error';
                resendMsg.textContent = 'Network error. Try again.';
            }

            setTimeout(function () {
                resendBtn.disabled = false;
                resendCooldown = false;
                if (resendMsg.textContent === 'Email resent! Check your inbox.') resendMsg.textContent = '';
            }, 60000);
        });
    </script>
</body>
</html>
