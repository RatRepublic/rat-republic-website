<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css" integrity="sha384-kcNNzf7wI8//ZkNUaDd5JwxLoFaBgkj9Z4O4NwtuX9Lkmsz0HoITOxJsGkYxDuyG" crossorigin="anonymous">

    <link rel="stylesheet" href="css/styles.css">
    <style>
        .beta-banner {
            font-family: 'NftOpensea', monospace;
            font-size: 1.4rem;
            color: #ff4444;
            letter-spacing: 4px;
            text-align: center;
            text-shadow: 0 0 16px rgba(255,68,68,0.7), 0 0 32px rgba(255,68,68,0.4);
            padding: 14px 0 4px;
            animation: betapulse 2.5s ease-in-out infinite;
        }
        @keyframes betapulse {
            0%, 100% { text-shadow: 0 0 12px rgba(255,68,68,0.6), 0 0 28px rgba(255,68,68,0.3); }
            50%       { text-shadow: 0 0 22px rgba(255,68,68,0.9), 0 0 44px rgba(255,68,68,0.5); }
        }
    </style>

<body id="top">

<section class="hero-section">
    <div class="container-fluid">
        <div class="row align-items-center">

            <div class="col-lg-6">
                <div class="hero-content">
                    <div class="beta-banner">BETA TESTING</div>
                    <h1 class="display-rat">Rat Republic</h1>
                    <p class="lead">Building tools and a reward ecosystem for the underground community. Empowering the unseen with tech and incentives to modernize and dignify subterranean life.</p>
                    
                    <div class="mt-4">
                        <div class="row g-2 mb-2">
                            <div class="col-6">
                                <a href="https://x.com/rat_republicsol" target="_blank" class="btn btn-green-custom btn-lg rounded-3 w-100">X</a>
                            </div>
                            <div class="col-6">
                                <a href="https://x.com/i/communities/1991029179991859265" target="_blank" class="btn btn-green-custom btn-lg rounded-3 w-100">Community</a>
                            </div>
                        </div>
                        <div class="row g-2 mb-2">
                            <div class="col-6">
                                <a href="https://dexscreener.com/solana/" target="_blank" class="btn btn-green-custom btn-lg rounded-3 w-100">Dexscreener</a>
                            </div>
                            <div class="col-6">
                                <a href="tools" class="btn btn-green-custom btn-lg rounded-3 w-100">Utilities</a>
                            </div>
                        </div>
                        <div class="row g-2 mb-2">
                            <div class="col-6">
                                <a href="https://pump.fun/" target="_blank" class="btn btn-green-custom btn-lg rounded-3 w-100">Pumpfun</a>
                            </div>
                            <div class="col-6">
                                <a href="https://rat-republic.gitbook.io/rat-republic-docs" target="_blank" class="btn btn-green-custom btn-lg rounded-3 w-100">Documentation</a>
                            </div>
                        </div>
                        <div class="row g-2 mb-2">
                            <div class="col-12">
                                <a href="generator" class="btn btn-green-custom btn-lg rounded-3 w-100">Rat Republic PFP Generator</a>
                            </div>
                        </div>
                        <div class="row g-2 mb-2">
                            <div class="col-12">
                                <a href="branding.zip" download class="btn btn-green-custom btn-lg rounded-3 w-100">Brand Vector File</a>
                            </div>
                        </div>
                        <div class="ca-box mt-3">
                            <span class="ca-label">CA</span>
                            <span class="ca-address" id="ca-address">TBA</span>
                            <button id="copy-ca-btn" onclick="copyCA()">Copy</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-6 text-center">
                <img src="main.png" alt="Rat Republic Character Artwork" class="img-fluid rat-main-image">
            </div>
            
        </div>
    </div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js" integrity="sha384-l/y5WJTphApmSlx76Ev6k4G3zxu/+19CVvn9OTKI7gs4Yu5Hm8mjpdtdr5oyhnNo" crossorigin="anonymous"></script>

<script>
    $(document).ready(function(){
        $(".owl-carousel").owlCarousel({
            loop:true,
            margin:30,
            nav:true,
            dots:false,
            autoplay:true,
            autoplayTimeout:5000,
            responsive:{
                0:{
                    items:1
                },
                768:{
                    items:2
                },
                1200:{
                    items:3
                }
            }
        });
    });
</script>
