<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rat Republic — Login</title>
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
    <style>
        @font-face { font-family: 'Inter'; src: url('fonts/Inter-VariableFont_opsz,wght.ttf') format('truetype'); font-weight: 100 900; font-style: normal; }
        @font-face { font-family: 'NftOpensea'; src: url('fonts/NftOpenseaRegular-jEJvR.ttf') format('truetype'); }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #080808; --surface: #111111; --surface-2: #161616;
            --border: rgba(255,255,255,0.07); --border-hover: rgba(255,255,255,0.15);
            --text: #ffffff; --text-muted: rgba(255,255,255,0.45); --text-dim: rgba(255,255,255,0.22);
            --accent: #C8E030; --accent-dim: rgba(200,224,48,0.1);
        }
        html, body { min-height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 20px 60px; min-height: 100vh; }

        .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; margin-bottom: 32px; }
        .brand img { width: 28px; height: 28px; object-fit: contain; }
        .brand span { font-family: 'NftOpensea'; font-size: 0.88rem; letter-spacing: 0.12em; color: var(--text); }

        .auth-card { width: 100%; max-width: 400px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 36px 32px; }

        .card-title { font-family: 'NftOpensea'; font-size: 1.5rem; letter-spacing: 0.08em; color: var(--text); margin-bottom: 4px; text-align: center; }
        .card-sub { font-size: 0.72rem; color: var(--text-dim); text-align: center; letter-spacing: 0.06em; margin-bottom: 28px; }

        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 0.62rem; font-weight: 600; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 7px; }
        .field input { width: 100%; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.9rem; padding: 11px 14px; outline: none; transition: border-color 0.15s; }
        .field input:focus { border-color: rgba(200,224,48,0.4); }
        .field input::placeholder { color: var(--text-dim); }

        .btn-submit { width: 100%; font-family: 'NftOpensea'; font-size: 0.88rem; letter-spacing: 0.08em; color: #0a0a0a; background: var(--accent); border: none; border-radius: 10px; padding: 14px; cursor: pointer; transition: opacity 0.15s; margin-top: 6px; }
        .btn-submit:hover { opacity: 0.9; }
        .btn-submit:disabled { opacity: 0.35; cursor: not-allowed; }

        .msg { margin-top: 12px; font-size: 0.78rem; text-align: center; min-height: 1.2em; }
        .msg.error { color: #ff8080; }
        .msg.success { color: var(--accent); }

        .footer-link { text-align: center; margin-top: 20px; font-size: 0.74rem; color: var(--text-dim); }
        .footer-link a { color: var(--accent); text-decoration: none; }
        .footer-link a:hover { text-decoration: underline; }

        .forgot-link { text-align: right; margin-top: -8px; margin-bottom: 14px; font-size: 0.7rem; }
        .forgot-link a { color: var(--text-dim); text-decoration: none; cursor: pointer; transition: color 0.15s; }
        .forgot-link a:hover { color: var(--accent); }

        .forgot-panel { display: none; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; }
        .forgot-panel label { display: block; font-size: 0.62rem; font-weight: 600; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
        .forgot-panel input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.85rem; padding: 9px 12px; outline: none; transition: border-color 0.15s; margin-bottom: 10px; }
        .forgot-panel input:focus { border-color: rgba(200,224,48,0.4); }
        .forgot-panel input::placeholder { color: var(--text-dim); }
        .btn-forgot-send { width: 100%; font-family: 'Inter'; font-size: 0.8rem; font-weight: 600; padding: 9px; border-radius: 8px; border: 1px solid rgba(200,224,48,0.25); background: var(--accent-dim); color: var(--accent); cursor: pointer; transition: all 0.15s; }
        .btn-forgot-send:hover { background: rgba(200,224,48,0.18); }
        .btn-forgot-send:disabled { opacity: 0.35; cursor: not-allowed; }

        .resend-bar { display: none; margin-top: 12px; padding: 12px 14px; background: rgba(255,200,0,0.04); border: 1px solid rgba(255,200,0,0.14); border-radius: 8px; font-size: 0.74rem; color: var(--text-muted); text-align: center; line-height: 1.6; }
        .btn-resend { background: transparent; border: 1px solid var(--border-hover); color: var(--text-dim); font-family: 'Inter'; font-size: 0.72rem; padding: 5px 14px; border-radius: 6px; cursor: pointer; transition: all 0.15s; margin-top: 8px; }
        .btn-resend:hover { border-color: var(--accent); color: var(--accent); }
        .btn-resend:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>
    <a href="/" class="brand">
        <img src="images/branding/rat-republic-logo.svg" alt="">
        <span>RAT REPUBLIC</span>
    </a>

    <div class="auth-card">
        <div class="card-title">LOGIN</div>
        <div class="card-sub">WELCOME BACK, RAT</div>

        <div class="field">
            <label>Email or Username</label>
            <input type="text" id="email" placeholder="you@example.com or RatKing" autocomplete="username">
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" id="password" placeholder="Your password" autocomplete="current-password">
        </div>

        <div class="forgot-link"><a id="forgot-toggle">Forgot password?</a></div>

        <div class="forgot-panel" id="forgot-panel">
            <label>Enter your email</label>
            <input type="email" id="forgot-email" placeholder="you@example.com" autocomplete="email">
            <button class="btn-forgot-send" id="forgot-send-btn">Send Reset Link</button>
            <div class="msg" id="forgot-msg" style="margin-top:8px;"></div>
        </div>

        <button class="btn-submit" id="login-btn">Log In</button>
        <div class="msg" id="msg"></div>

        <div class="resend-bar" id="resend-bar">
            Your email address hasn't been verified yet.<br>
            <button class="btn-resend" id="resend-btn">Resend Verification Email</button>
            <div class="msg" id="resend-msg" style="margin-top:6px;font-size:0.72rem;"></div>
        </div>

        <div class="footer-link">Don't have an account? <a href="register">Register</a></div>
    </div>

    <script>
        if (localStorage.getItem('rr_token')) {
            window.location.href = 'profile.html';
        }

        var btn = document.getElementById('login-btn');
        var msg = document.getElementById('msg');

        document.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !btn.disabled) btn.click();
        });

        var lastEmail = '';

        btn.addEventListener('click', async function () {
            var email    = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;

            msg.className = 'msg';
            msg.textContent = '';
            document.getElementById('resend-bar').style.display = 'none';

            if (!email || !password) {
                msg.className = 'msg error';
                msg.textContent = 'Email and password are required.';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Logging in...';
            lastEmail = email;

            try {
                var resp = await fetch('api/auth.php?action=login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                });
                var data = await resp.json();

                if (!resp.ok) {
                    msg.className = 'msg error';
                    msg.textContent = data.error || 'Login failed.';
                    btn.disabled = false;
                    btn.textContent = 'Log In';
                    if (data.unverified) {
                        document.getElementById('resend-bar').style.display = 'block';
                    }
                    return;
                }

                localStorage.setItem('rr_token', data.token);
                localStorage.setItem('rr_username', data.username);
                window.location.href = 'profile.html';
            } catch (e) {
                msg.className = 'msg error';
                msg.textContent = 'Network error. Please try again.';
                btn.disabled = false;
                btn.textContent = 'Log In';
            }
        });

        document.getElementById('forgot-toggle').addEventListener('click', function () {
            var panel = document.getElementById('forgot-panel');
            var isOpen = panel.style.display === 'block';
            panel.style.display = isOpen ? 'none' : 'block';
            this.textContent = isOpen ? 'Forgot password?' : 'Cancel';
            if (!isOpen) document.getElementById('forgot-email').focus();
        });

        var forgotCooldown = false;
        document.getElementById('forgot-send-btn').addEventListener('click', async function () {
            if (forgotCooldown) return;
            var email     = document.getElementById('forgot-email').value.trim();
            var forgotMsg = document.getElementById('forgot-msg');

            forgotMsg.className = 'msg';
            forgotMsg.textContent = '';

            if (!email) {
                forgotMsg.className = 'msg error';
                forgotMsg.textContent = 'Please enter your email address.';
                return;
            }

            this.disabled = true;
            this.textContent = 'Sending...';
            forgotCooldown = true;

            try {
                await fetch('api/auth.php?action=forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });
                forgotMsg.className = 'msg success';
                forgotMsg.textContent = 'If that email is registered, a reset link is on its way.';
                this.textContent = 'Sent';
            } catch (e) {
                forgotMsg.className = 'msg error';
                forgotMsg.textContent = 'Network error. Try again.';
                this.disabled = false;
                this.textContent = 'Send Reset Link';
                forgotCooldown = false;
            }

            setTimeout(function () {
                var b = document.getElementById('forgot-send-btn');
                b.disabled = false;
                b.textContent = 'Send Reset Link';
                forgotCooldown = false;
            }, 60000);
        });

        var resendCooldown = false;
        document.getElementById('resend-btn').addEventListener('click', async function () {
            if (resendCooldown || !lastEmail) return;
            var resendBtn = this;
            var resendMsg = document.getElementById('resend-msg');
            resendBtn.disabled = true;
            resendMsg.className = 'msg';
            resendMsg.textContent = 'Sending...';
            resendCooldown = true;

            try {
                await fetch('api/auth.php?action=resend-verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: lastEmail })
                });
                resendMsg.className = 'msg success';
                resendMsg.textContent = 'Verification email sent! Check your inbox.';
            } catch (e) {
                resendMsg.className = 'msg error';
                resendMsg.textContent = 'Network error. Try again.';
            }

            setTimeout(function () {
                resendBtn.disabled = false;
                resendCooldown = false;
            }, 60000);
        });
    </script>
</body>
</html>
